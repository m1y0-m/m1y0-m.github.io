<!DOCTYPE html>
<html>
	<head>
		<link rel = "stylesheet" href = "VIS3Style.css">
		<title>Homework</title>
	</head>
	<body>
		<header class = "Homework">
			<h1> Time to do homework! </h1>
			<p>
				Looks like you need to spend some time on work! Not to worry though, if you're
				productive, you can get to something more fun!
			</p>
			<p>
				Let's use the Pomodoro time to stay focused. 25 minutes of work, 5 minute break.
			</p>
		</header>
		<main>
			<div class = "timerContainer">
				<div class = "session-label" id = "sessionLabel"> Work Time </div>
				<div class = "timer-display" id = "timerDisplay"> 25:00 </div>
				<div class = "timer-buttons">
					<button class = "timer-btn" id = "startBtn"> Start </button>
					<button class = "timer-btn" id = "pauseBtn"> Pause </button>
					<button class = "timer-btn" id = "resetBtn"> Reset </button>
				</div>
			</div>
			<div class = "NextPage1">
				<a href = "Page2.html" class = "Page2Button"> Return to Seat Selection </a>
			</div>
		</main>
		<script src = "Timerjava.js"></script>
	</body>
</html>
