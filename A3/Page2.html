<!DOCTYPE html>
<html>
	<head>
		<link rel = "stylesheet" href = "VIS3Style.css">
		<title> Find a Seat</title>
	</head>
	<body>
		<header class = "page2Header">
			<h1> Welcome to Lewis 120 </h1>
			<p>
				This is the 120 lecture room. Lots of stuff go on here. Here is where we will explore.
			</p>
			<p>
				Pick a place to sit. Depending on where you choose, you'll get to 
				experience a different activity.
			</p>
		</header>
		<main>
			<div class = "seatSelection">
				<div class = "room-panel">
					<img src = "LeftChairs.jpg" alt = "Left Shot of 120">
					
					<button class = "seat-zone zone-front-left" data-page = "frontleft.html">
					</button>
					
					<button class = "seat-zone zone-front-middle2" data-page = "frontmiddle.html">
					</button>
					
					<button class = "seat-zone zone-back-left" data-page = "backleft.html">
					</button>
					
					<button class = "seat-zone zone-back-middle2" data-page = "backmiddle.html">
					</button>
				</div>
				<div class = "room-panel">
					<img src = "MiddleChairs2.jpg" alt = "Middle Shot of 120">
					<button class = "seat-zone zone-front-middle" data-page = "frontmiddle.html">
					</button>
					<button class = "seat-zone zone-back-middle" data-page = "backmiddle.html">
					</button>
					<button class = "seat-zone zone-front-front" data-page = "front.html">
					</button>
				</div>
				<div class = "room-panel">
					<img src = "RightChairs.jpg" alt = "Right Shot of 120">
					<button class = "seat-zone zone-front-right" data-page = "frontright.html">
					</button>
					
					<button class = "seat-zone zone-front-middle3" data-page = "frontmiddle.html">
					</button>
					
					<button class = "seat-zone zone-back-right" data-page = "backright.html">
					</button>
					
					<button class = "seat-zone zone-back-middle3" data-page = "backmiddle.html">
					</button>
				</div>
			</div>
			<div class = "NextPage1">
				<a href = "index.html" class = "Page2Button"> Go Back Outside </a>
			</div>
		</main>
		<script src = "VIS3Java.js"></script>
	</body>
</html>
